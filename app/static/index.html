<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalScript Agent</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#1e1e1e;--bg-secondary:#252526;--bg-tertiary:#2d2d30;
  --bg-input:#3c3c3c;--bg-hover:#3e3e42;--bg-active:#094771;
  --text-primary:#cccccc;--text-secondary:#858585;--text-muted:#5a5a5a;
  --accent:#007acc;--accent-hover:#1c97ea;--accent-dim:#1a4a73;
  --border:#3e3e42;--border-light:#4f4f54;
  --user-bubble:#264f78;--assistant-bubble:#2d2d30;
  --success:#4ec9b0;--error:#f44747;--warning:#dcdcaa;
  --code-bg:#1e1e1e;--scrollbar:#424242;--scrollbar-hover:#555;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-hover)}

.app{display:flex;height:100vh;width:100vw}

.sidebar{width:260px;min-width:260px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .25s ease,opacity .25s ease;z-index:100}
.sidebar.collapsed{transform:translateX(-260px);position:absolute;height:100%;opacity:0;pointer-events:none}

.sidebar-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.sidebar-header .logo{font-size:16px;font-weight:600;color:var(--accent);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-header .logo span{color:var(--text-primary);font-weight:400}

.btn-new{display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;margin:12px 16px 8px;width:calc(100% - 32px);background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-new:hover{background:var(--accent-hover)}
.btn-new svg{flex-shrink:0}

.sessions{flex:1;overflow-y:auto;padding:4px 8px}
.session-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:background .15s,color .15s;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.session-item.active{background:var(--bg-active);color:var(--text-primary)}
.session-item .session-title{flex:1;overflow:hidden;text-overflow:ellipsis}
.session-item .btn-del{display:none;background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;flex-shrink:0}
.session-item:hover .btn-del{display:block}
.session-item .btn-del:hover{color:var(--error);background:var(--bg-hover)}

.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)}
.sidebar-footer .health-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.sidebar-footer .health-dot.ok{background:var(--success)}
.sidebar-footer .health-dot.degraded{background:var(--warning)}
.sidebar-footer .health-dot.error{background:var(--error)}

.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-primary)}

.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg-secondary);min-height:48px}
.topbar .btn-toggle-sidebar{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:4px;display:flex;align-items:center}
.topbar .btn-toggle-sidebar:hover{background:var(--bg-hover);color:var(--text-primary)}
.topbar .model-select{background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;outline:none;margin-left:auto;max-width:200px}
.topbar .model-select:focus{border-color:var(--accent)}
.topbar .current-title{font-size:14px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

.messages{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column}
.messages-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text-muted)}
.messages-empty .hero-icon{font-size:48px;color:var(--accent);opacity:.5}
.messages-empty h2{font-size:20px;font-weight:400;color:var(--text-secondary)}
.messages-empty p{font-size:14px;max-width:400px;text-align:center;line-height:1.6}

.msg-row{display:flex;padding:4px 20px;animation:fadeIn .3s ease}
.msg-row.user{justify-content:flex-end}
.msg-row.assistant{justify-content:flex-start}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-bubble{max-width:72%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;position:relative;word-break:break-word}
.msg-row.user .msg-bubble{background:var(--user-bubble);border-bottom-right-radius:4px;color:#e0e0e0}
.msg-row.assistant .msg-bubble{background:var(--assistant-bubble);border:1px solid var(--border);border-bottom-left-radius:4px}

.msg-meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11px;color:var(--text-muted)}
.msg-meta .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge.pass{background:rgba(78,201,176,.15);color:var(--success)}
.badge.fail{background:rgba(244,71,71,.15);color:var(--error)}
.badge.warn{background:rgba(220,220,170,.15);color:var(--warning)}
.badge.generated{background:rgba(0,122,204,.15);color:var(--accent-hover)}
.badge.repaired{background:rgba(220,220,170,.15);color:var(--warning)}
.badge.clarification_required{background:rgba(244,71,71,.15);color:var(--error)}

.btn-regen{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:4px}
.btn-regen:hover{color:var(--accent);background:var(--bg-hover)}

.code-block{margin:8px 0;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--code-bg)}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg-tertiary);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-secondary)}
.code-header .lang-label{text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.code-header .btn-copy{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:4px}
.code-header .btn-copy:hover{color:var(--text-primary);background:var(--bg-hover)}
.code-header .btn-copy.copied{color:var(--success)}
.code-block pre{margin:0;padding:12px;overflow-x:auto;font-size:13px;line-height:1.5;font-family:'Cascadia Code','Fira Code','Consolas',monospace}
.code-block pre code{background:transparent!important;padding:0!important}

.assumptions-block{margin:8px 0;padding:8px 12px;border-radius:6px;background:var(--bg-tertiary);border:1px solid var(--border);font-size:13px}
.assumptions-block .label{font-weight:600;color:var(--warning);margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.assumptions-block .assumption-item{padding:4px 8px;margin:2px 0;border-radius:4px;background:var(--bg-hover);cursor:pointer;transition:background .15s}
.assumptions-block .assumption-item:hover{background:var(--accent-dim)}

.question-block{margin:8px 0;padding:10px 14px;border-radius:6px;background:rgba(0,122,204,.08);border:1px solid var(--accent-dim);font-size:13px;color:var(--accent-hover)}
.question-block .label{font-weight:600;color:var(--accent);margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}

.oracle-block{margin:8px 0;padding:8px 12px;border-radius:6px;background:var(--bg-tertiary);border:1px solid var(--border);font-size:12px}
.oracle-block .label{font-weight:600;color:var(--text-secondary);margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}

.input-area{padding:12px 20px 16px;border-top:1px solid var(--border);background:var(--bg-secondary)}
.input-wrap{display:flex;align-items:flex-end;gap:8px;max-width:800px;margin:0 auto;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:6px 8px 6px 16px;transition:border-color .15s}
.input-wrap:focus-within{border-color:var(--accent)}
.input-wrap textarea{flex:1;background:transparent;border:none;color:var(--text-primary);font-size:14px;font-family:inherit;resize:none;outline:none;max-height:120px;min-height:24px;line-height:1.5;padding:6px 0}
.input-wrap textarea::placeholder{color:var(--text-muted)}
.btn-send{background:var(--accent);color:#fff;border:none;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0}
.btn-send:hover{background:var(--accent-hover)}
.btn-send:disabled{background:var(--bg-hover);color:var(--text-muted);cursor:not-allowed}
.btn-send svg{width:18px;height:18px}

.typing-indicator{display:flex;align-items:center;gap:4px;padding:12px 16px}
.typing-indicator .dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);animation:blink 1.4s infinite both}
.typing-indicator .dot:nth-child(2){animation-delay:.2s}
.typing-indicator .dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

.error-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--error);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:1000;animation:fadeIn .3s ease;max-width:90vw;text-align:center}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100%;box-shadow:4px 0 16px rgba(0,0,0,.4)}
  .sidebar.collapsed{transform:translateX(-260px)}
  .msg-bubble{max-width:88%}
  .input-area{padding:8px 12px 12px}
  .messages{padding:12px 0}
  .msg-row{padding:4px 12px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">LocalScript <span>Agent</span></div>
    </div>
    <button class="btn-new" onclick="newSession()" title="Новый чат / New Chat">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1v6H1v2h7v7h2V9h7V7H9V1z"/></svg>
      Новый чат
    </button>
    <div class="sessions" id="sessionList"></div>
    <div class="sidebar-footer" id="sidebarFooter">
      <span class="health-dot" id="healthDot"></span>
      <span id="healthText">Загрузка…</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="btn-toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
      <div class="current-title" id="currentTitle">LocalScript Agent</div>
      <select class="model-select" id="modelSelect" title="Модель / Model"><option value="">Default model</option></select>
    </div>

    <div class="messages" id="messagesContainer">
      <div class="messages-empty" id="emptyState">
        <div class="hero-icon">⟨/⟩</div>
        <h2>LocalScript Agent</h2>
        <p>Генерация Lua-скриптов на основе описания задачи.<br>Опишите задачу — агент сгенерирует, проверит и при необходимости починит код.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="msgInput" rows="1" placeholder="Опишите задачу / Describe the task…" onkeydown="handleKey(event)"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendMessage()" title="Отправить / Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script>
const API_BASE = window.location.origin;
const LS_KEY = 'ls_agent_sessions';
const LS_ACTIVE = 'ls_agent_active';

let sessions = loadSessions();
let activeId = localStorage.getItem(LS_ACTIVE) || null;
let generating = false;

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function saveSessions() { localStorage.setItem(LS_KEY, JSON.stringify(sessions)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function getActive() { return activeId ? sessions[activeId] : null; }

function newSession() {
  const id = genId();
  sessions[id] = { id, title: 'Новый чат', messages: [], createdAt: Date.now(), code: '' };
  activeId = id;
  localStorage.setItem(LS_ACTIVE, id);
  saveSessions();
  renderSidebar();
  renderChat();
  document.getElementById('msgInput').focus();
}

function switchSession(id) {
  activeId = id;
  localStorage.setItem(LS_ACTIVE, id);
  renderSidebar();
  renderChat();
}

function deleteSession(id, e) {
  e.stopPropagation();
  delete sessions[id];
  if (activeId === id) {
    const keys = Object.keys(sessions);
    activeId = keys.length ? keys[keys.length - 1] : null;
    localStorage.setItem(LS_ACTIVE, activeId || '');
  }
  saveSessions();
  renderSidebar();
  renderChat();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || generating) return;

  if (!activeId) newSession();
  const sess = getActive();
  if (!sess) return;

  sess.messages.push({ role: 'user', content: text });
  input.value = '';
  autoResize(input);
  renderChat();

  generating = true;
  document.getElementById('btnSend').disabled = true;
  showTyping();

  try {
    const lastAssistant = [...sess.messages].reverse().find(m => m.role === 'assistant');

    const repairSignals = [
      /\b(исправь|поменяй|замени|измени|добавь|убери|удали|fix|change|replace|modify|add|remove|update)\b/i,
    ];
    const looksLikeRepair = repairSignals.some(rx => rx.test(text)) && lastAssistant && sess.code;
    const looksLikeNewTask = /\b(напиши|создай|сгенерируй|сделай|write|create|generate|build|найди|посчитай|вычисли|find|count|calculate)\b/i.test(text);

    let body, endpoint;
    endpoint = '/agent/generate';
    if (looksLikeRepair && !looksLikeNewTask) {
      body = {
        prompt: text,
        previous_code: sess.code,
        feedback: text,
      };
    } else {
      body = { prompt: text };
      if (lastAssistant && sess.code && !looksLikeNewTask) {
        body.assumption = lastAssistant.output_contract || null;
      }
    }

    const model = document.getElementById('modelSelect').value;
    if (model) body.model = model;

    const res = await fetch(API_BASE + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Server error');
    }

    const data = await res.json();

    if (sess.messages.length === 1) {
      sess.title = text.slice(0, 40) + (text.length > 40 ? '…' : '');
    }

    const assistantMsg = {
      role: 'assistant',
      content: '',
      status: data.status,
      code: data.code || '',
      question: data.question || null,
      acceptable_assumptions: data.acceptable_assumptions || [],
      assumptions: data.assumptions || [],
      output_contract: data.output_contract || null,
      used_repair: data.used_repair || false,
    };

    if (data.code) {
      assistantMsg.content = buildAssistantText(data);
      sess.code = data.code;
    } else if (data.question) {
      assistantMsg.content = data.question;
    } else {
      assistantMsg.content = 'Код не сгенерирован / No code generated';
    }

    sess.messages.push(assistantMsg);
    saveSessions();
    renderSidebar();
    renderChat();
  } catch (err) {
    showToast(err.message);
  } finally {
    generating = false;
    document.getElementById('btnSend').disabled = false;
    removeTyping();
  }
}

function buildAssistantText(data) {
  let parts = [];
  if (data.status === 'clarification_required' && data.question) {
    parts.push(data.question);
  } else if (data.code) {
    parts.push('Сгенерированный Lua-скрипт:\n```lua\n' + data.code + '\n```');
  }
  return parts.join('\n\n');
}

async function regenerate(msgIdx) {
  const sess = getActive();
  if (!sess || generating) return;

  const userMsg = sess.messages.slice(0, msgIdx).reverse().find(m => m.role === 'user');
  if (!userMsg) return;

  sess.messages = sess.messages.slice(0, msgIdx);
  sess.code = '';
  saveSessions();
  renderChat();

  generating = true;
  document.getElementById('btnSend').disabled = true;
  showTyping();

  try {
    const prevAssistant = sess.messages.slice(0, -1).reverse().find(m => m.role === 'assistant');
    let body = { prompt: userMsg.content };
    const model = document.getElementById('modelSelect').value;
    if (model) body.model = model;

    if (prevAssistant && prevAssistant.output_contract) {
      body.assumption = prevAssistant.output_contract;
    }

    const res = await fetch(API_BASE + '/agent/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Server error');
    }

    const data = await res.json();
    const assistantMsg = {
      role: 'assistant',
      content: '',
      status: data.status,
      code: data.code || '',
      question: data.question || null,
      acceptable_assumptions: data.acceptable_assumptions || [],
      assumptions: data.assumptions || [],
      output_contract: data.output_contract || null,
      used_repair: data.used_repair || false,
    };

    if (data.code) {
      assistantMsg.content = buildAssistantText(data);
      sess.code = data.code;
    } else if (data.question) {
      assistantMsg.content = data.question;
    } else {
      assistantMsg.content = 'Код не сгенерирован / No code generated';
    }

    sess.messages.push(assistantMsg);
    saveSessions();
    renderSidebar();
    renderChat();
  } catch (err) {
    showToast(err.message);
  } finally {
    generating = false;
    document.getElementById('btnSend').disabled = false;
    removeTyping();
  }
}

function renderSidebar() {
  const list = document.getElementById('sessionList');
  const sorted = Object.values(sessions).sort((a, b) => b.createdAt - a.createdAt);
  list.innerHTML = sorted.map(s => `
    <div class="session-item ${s.id === activeId ? 'active' : ''}" onclick="switchSession('${s.id}')">
      <span class="session-title">${escHtml(s.title)}</span>
      <button class="btn-del" onclick="deleteSession('${s.id}',event)" title="Удалить / Delete">×</button>
    </div>
  `).join('');
}

function renderChat() {
  const container = document.getElementById('messagesContainer');
  const sess = getActive();
  const title = document.getElementById('currentTitle');

  if (!sess || sess.messages.length === 0) {
    container.innerHTML = `<div class="messages-empty" id="emptyState">
      <div class="hero-icon">⟨/⟩</div>
      <h2>LocalScript Agent</h2>
      <p>Генерация Lua-скриптов на основе описания задачи.<br>Опишите задачу — агент сгенерирует, проверит и при необходимости починит код.</p>
    </div>`;
    title.textContent = 'LocalScript Agent';
    return;
  }

  title.textContent = sess.title;

  container.innerHTML = sess.messages.map((msg, idx) => {
    if (msg.role === 'user') {
      return `<div class="msg-row user"><div class="msg-bubble">${escHtml(msg.content)}</div></div>`;
    }
    return `<div class="msg-row assistant"><div class="msg-bubble">
      ${renderAssistantContent(msg, idx)}
      ${renderMeta(msg, idx)}
    </div></div>`;
  }).join('');

  container.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });

  container.scrollTop = container.scrollHeight;
}

function renderAssistantContent(msg, idx) {
  let html = '';

  if (msg.question && (!msg.code || msg.status === 'clarification_required')) {
    html += `<div class="question-block"><div class="label">Уточнение / Clarification</div>${escHtml(msg.question)}</div>`;
  }

  if (msg.acceptable_assumptions && msg.acceptable_assumptions.length) {
    html += `<div class="assumptions-block"><div class="label">Допущения / Assumptions</div>`;
    msg.acceptable_assumptions.forEach(a => {
      html += `<div class="assumption-item" onclick="assumeAndContinue('${escAttr(a)}',${idx})">${escHtml(a)}</div>`;
    });
    html += `</div>`;
  }

  if (msg.code) {
    html += `<div class="code-block">
      <div class="code-header"><span class="lang-label">lua</span><button class="btn-copy" onclick="copyCode(this,${idx})" title="Копировать / Copy">📋 Copy</button></div>
      <pre><code class="language-lua">${escHtml(msg.code)}</code></pre>
    </div>`;
  }

  if (msg.status && msg.code) {
    const statusMap = {
      generated: { label: 'Сгенерирован / Generated', cls: 'generated' },
      repaired: { label: 'Отремонтирован / Repaired', cls: 'repaired' },
      clarification_required: { label: 'Требуется уточнение / Clarification', cls: 'clarification_required' },
    };
    const s = statusMap[msg.status] || { label: msg.status, cls: 'warn' };
    html += `<span class="badge ${s.cls}">${s.label}</span>`;
    if (msg.used_repair) {
      html += ` <span class="badge warn">Repair used</span>`;
    }
  }

  return html;
}

function renderMeta(msg, idx) {
  let html = '<div class="msg-meta">';
  if (msg.status) {
    html += `<button class="btn-regen" onclick="regenerate(${idx})" title="Перегенерировать / Regenerate">↻ Regenerate</button>`;
  }
  html += '</div>';
  return html;
}

async function assumeAndContinue(assumption, msgIdx) {
  const sess = getActive();
  if (!sess || generating) return;

  const lastUserMsg = [...sess.messages].reverse().find(m => m.role === 'user');
  if (!lastUserMsg) return;

  generating = true;
  document.getElementById('btnSend').disabled = true;

  sess.messages.push({ role: 'user', content: 'Принимаю допущение: ' + assumption });
  saveSessions();
  renderChat();
  showTyping();

  try {
    let body = { prompt: lastUserMsg.content, assumption: assumption };
    const model = document.getElementById('modelSelect').value;
    if (model) body.model = model;

    const res = await fetch(API_BASE + '/agent/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Server error');
    }

    const data = await res.json();

    const assistantMsg = {
      role: 'assistant',
      content: '',
      status: data.status,
      code: data.code || '',
      question: data.question || null,
      acceptable_assumptions: data.acceptable_assumptions || [],
      assumptions: data.assumptions || [],
      output_contract: data.output_contract || null,
      used_repair: data.used_repair || false,
    };

    if (data.code) {
      assistantMsg.content = buildAssistantText(data);
      sess.code = data.code;
    } else if (data.question) {
      assistantMsg.content = data.question;
    } else {
      assistantMsg.content = 'Код не сгенерирован / No code generated';
    }

    sess.messages.push(assistantMsg);
    saveSessions();
    renderSidebar();
    renderChat();
  } catch (err) {
    showToast(err.message);
  } finally {
    generating = false;
    document.getElementById('btnSend').disabled = false;
    removeTyping();
  }
}

function copyCode(btn, msgIdx) {
  const sess = getActive();
  if (!sess) return;
  const msg = sess.messages[msgIdx];
  if (!msg || !msg.code) return;
  navigator.clipboard.writeText(msg.code).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function showTyping() {
  const container = document.getElementById('messagesContainer');
  const el = document.createElement('div');
  el.className = 'msg-row assistant';
  el.id = 'typingRow';
  el.innerHTML = `<div class="msg-bubble"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'error-toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

async function checkHealth() {
  const dot = document.getElementById('healthDot');
  const txt = document.getElementById('healthText');
  try {
    const res = await fetch(API_BASE + '/health');
    const data = await res.json();
    dot.className = 'health-dot ' + (data.status === 'ok' ? 'ok' : 'degraded');
    txt.textContent = `${data.status.toUpperCase()} · ${data.default_model}`;
  } catch {
    dot.className = 'health-dot error';
    txt.textContent = 'OFFLINE';
  }
}

async function loadModels() {
  const sel = document.getElementById('modelSelect');
  try {
    const res = await fetch(API_BASE + '/models');
    const data = await res.json();
    const models = data.allowed_models || data.installed_models || [];
    sel.innerHTML = '<option value="">Default: ' + (data.required_demo_model || '—') + '</option>';
    models.forEach(m => {
      const installed = (data.installed_models || []).includes(m);
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m + (installed ? '' : ' ⚠');
      sel.appendChild(opt);
    });
  } catch {}
}

const input = document.getElementById('msgInput');
input.addEventListener('input', () => autoResize(input));

checkHealth();
loadModels();
renderSidebar();
if (activeId && sessions[activeId]) renderChat();
else document.getElementById('emptyState') || renderChat();
</script>
</body>
</html>
