services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: localscript-agent-api
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_BASE_URLS: ${OLLAMA_BASE_URLS:-http://host.docker.internal:11434,http://localhost:11434}
      API_PORT: ${API_PORT:-8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./:/app
    restart: unless-stopped
